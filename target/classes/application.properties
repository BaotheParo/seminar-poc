# Cấu hình kết nối Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/audioguide_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
# Fix: Chạy data.sql SAU khi Hibernate tạo bảng
spring.jpa.defer-datasource-initialization=true
# Fix: Bắt buộc chạy script data.sql dù là DB thật
spring.sql.init.mode=always

# Cấu hình JPA/Hibernate
# Tự động update schema database dựa trên Entity
spring.jpa.hibernate.ddl-auto=update
# Hiển thị câu lệnh SQL trong console (để debug)
spring.jpa.show-sql=true
# Format SQL cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cấu hình Server
server.port=8080
