version: '3.8'

services:
  street-voice-backend:
    build: .
    container_name: street-voice-backend
    ports:
      - "8080:8080"
    volumes:
      - ./audio:/app/audio
    environment:
      - SERVER_ADDRESS=0.0.0.0
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://street-voice-db:5432/street_voice_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - VIETMAP_API_KEY_SERVICES=${VIETMAP_API_KEY_SERVICES}
      - AUDIO_BASE_URL=${AUDIO_BASE_URL}
    depends_on:
      - street-voice-db
    networks:
      - street-voice-network

  street-voice-db:
    image: postgis/postgis:14-3.4-alpine
    container_name: street-voice-db-new
    restart: always
    environment:
      - POSTGRES_DB=street_voice_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script to adding extensions if needed, though PostGIS image usually has them
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - street-voice-network

volumes:
  postgres_data:


networks:
  street-voice-network:
    driver: bridge
