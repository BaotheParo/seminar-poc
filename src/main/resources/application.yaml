spring:
  application:
    name: StreetVoice
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5432/street_voice_db
    username: postgres
    password: 
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10 
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.foodstreet.voice: DEBUG
    org.hibernate.SQL: DEBUG

vietmap:
  api-key: ${VIETMAP_API_KEY_SERVICES:}
  base-url: https://maps.vietmap.vn/api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  audio:
    local-path: ./audio
    base-url: ${AUDIO_BASE_URL:http://localhost:8080}
  auth:
    jwt-secret: ${JWT_SECRET:change-this-secret-minimum-32-characters-long-1234567890}
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:7}
    oauth2-success-redirect: ${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/login/callback}
    admin-whitelist-emails: ${ADMIN_WHITELIST_EMAILS:}
    bootstrap-enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    bootstrap-username: ${ADMIN_BOOTSTRAP_USERNAME:}
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL:}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    bootstrap-role: ${ADMIN_BOOTSTRAP_ROLE:ADMIN}
